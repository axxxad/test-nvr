services:
  nvr:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./recordings:/recordings
      - ./exports:/app/exports
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=sqlite:////data/nvr.db
      - RECORDINGS_DIR=/recordings
      # Match your PC/camera timezone (FFmpeg segment folders use container local time).
      - TZ=Europe/London
      - APP_TIMEZONE=Europe/London
