{% extends "base.html" %}

{% block title %}Add camera — CCTV NVR{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="/cameras" class="btn btn-ghost btn-sm">← Back to cameras</a>
</div>

<div class="card bg-base-100 shadow max-w-lg mx-auto">
  <div class="card-body">
    <h1 class="card-title text-2xl">Add camera</h1>

    <form method="post" action="/cameras/new" class="space-y-4 mt-4">
      <div class="form-control">
        <label class="label" for="name">
          <span class="label-text">Name</span>
        </label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ name }}"
          placeholder="Front door"
          class="input input-bordered w-full{% if errors.get('name') %} input-error{% endif %}"
          required
        />
        {% if errors.get('name') %}
        <label class="label">
          <span class="label-text-alt text-error">{{ errors.name }}</span>
        </label>
        {% endif %}
      </div>

      <div class="form-control">
        <label class="label" for="rtsp_url">
          <span class="label-text">RTSP URL</span>
        </label>
        <input
          type="text"
          id="rtsp_url"
          name="rtsp_url"
          value="{{ rtsp_url }}"
          placeholder="rtsp://USER:PASS@192.168.1.100:554/Streaming/Channels/101"
          class="input input-bordered w-full font-mono text-sm{% if errors.get('rtsp_url') %} input-error{% endif %}"
          required
        />
        {% if errors.get('rtsp_url') %}
        <label class="label">
          <span class="label-text-alt text-error">{{ errors.rtsp_url }}</span>
        </label>
        {% else %}
        <label class="label">
          <span class="label-text-alt">
            Hikvision main stream is usually channel <code>101</code>; substream is <code>102</code>.
          </span>
        </label>
        {% endif %}
      </div>

      <div class="form-control">
        <label class="label" for="retention_days">
          <span class="label-text">Retention (days)</span>
        </label>
        <input
          type="number"
          id="retention_days"
          name="retention_days"
          value="{{ retention_days|default(2) }}"
          min="1"
          max="365"
          class="input input-bordered w-full"
        />
        <label class="label">
          <span class="label-text-alt">Footage older than this is deleted automatically.</span>
        </label>
      </div>

      <div class="card-actions justify-end mt-6">
        <a href="/cameras" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save camera</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
